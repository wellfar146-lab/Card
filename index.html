<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اعتذار إلى فاطمة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f2e9e4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            width: 100%;
            padding: 2.5rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 2rem;
            border: 1px solid #f0d9cf;
        }

        .text-section {
            flex: 2 1 300px;
        }

        .text-section h1 {
            font-size: 2.8rem;
            color: #1e1e1e;
            margin-bottom: 0.3rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .text-section h1 span {
            color: #b35e5e;
        }

        .text-section .message {
            font-size: 1.2rem;
            color: #2c2c2c;
            line-height: 1.8;
            margin: 1.5rem 0 1rem 0;
            white-space: pre-line; /* يحترم السطور الجديدة */
            background: #fefaf8;
            padding: 1.3rem 1.8rem;
            border-radius: 20px;
            border-right: 5px solid #d4a5a5;
        }

        .text-section .signature {
            font-size: 1.2rem;
            color: #3a3a3a;
            text-align: left;
            margin-top: 1rem;
            font-weight: 500;
            border-top: 2px dashed #d9b8b8;
            padding-top: 1rem;
        }

        .flower-section {
            flex: 1 1 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .flower-icon {
            font-size: 10rem;
            line-height: 1;
            filter: drop-shadow(0 5px 10px rgba(180, 100, 100, 0.2));
        }

        .flower-icon small {
            display: block;
            font-size: 1rem;
            color: #6d4c4c;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        @media (max-width: 650px) {
            .card {
                flex-direction: column-reverse;
                text-align: center;
                padding: 2rem 1.5rem;
            }
            .text-section h1 {
                font-size: 2.2rem;
            }
            .flower-icon {
                font-size: 8rem;
            }
            .text-section .signature {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="text-section">
            <h1>أنا آسف <span>فاطمة</span></h1>
            <div class="message">
                وبعتذر منك لو زعلتك مني.<br>
                نحن في العشر الأواخر من رمضان وخاشي علينا العيد،<br>
                فأرجوكي سامحيني.<br>
                أنا بعرف إني زعلتك، وما كان قصدي أبداً.<br>
                الكلام كتير، بس حابي أقول إني ما متخيل شعوري إني أفارقك أبداً.
            </div>
            <div class="signature">
                خالص اعتذاري<br>
                هاشم
            </div>
        </div>
        <div class="flower-section">
            <div class="flower-icon">
                🌹
                <small>وردة اعتذار</small>
            </div>
        </div>
    </div>
</body>
</html>
