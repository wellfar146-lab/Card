<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة اعتذار إلى فاطمة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f8f0e7 0%, #f1d9d0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            max-width: 700px;
            width: 100%;
            padding: 2.5rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            transition: all 0.3s ease;
        }

        .apology-text {
            flex: 2 1 250px;
            text-align: center;
        }

        .apology-text h1 {
            font-size: 2.8rem;
            font-weight: 600;
            color: #5e3a2c;
            margin-bottom: 0.5rem;
            line-height: 1.3;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        .apology-text p {
            font-size: 1.4rem;
            color: #7a5a4a;
            margin-bottom: 1rem;
            font-weight: 300;
            background: rgba(255, 255, 255, 0.3);
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        .apology-text .small-note {
            font-size: 1.1rem;
            color: #b48c7c;
            margin-top: 1rem;
            font-style: italic;
        }

        .flower {
            flex: 1 1 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 9rem;
            filter: drop-shadow(0 10px 15px rgba(230, 161, 178, 0.4));
            animation: gentle-pulse 3s infinite ease-in-out;
        }

        /* حركة بسيطة للوردة */
        @keyframes gentle-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* تصميم متجاوب للشاشات الصغيرة */
        @media (max-width: 500px) {
            .card {
                flex-direction: column-reverse;
                text-align: center;
                padding: 2rem 1.5rem;
            }
            .flower {
                font-size: 7rem;
            }
            .apology-text h1 {
                font-size: 2.2rem;
            }
        }

        /* لمسة إضافية: قلب صغير */
        .credit {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #aa7b6b;
            opacity: 0.7;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="apology-text">
            <h1>أنا آسف يا فاطمة</h1>
            <p>سامحيني من فضلك</p>
            <div class="small-note">
                <span style="color: #d96c8c;">❤️</span>
                لم أقصد جرح مشاعركِ
                <span style="color: #d96c8c;">❤️</span>
            </div>
        </div>
        <div class="flower">
            <!-- وردة حمراء -->
            🌹
        </div>
        <div class="credit">
            🌷 مع خالص اعتذاري
        </div>
    </div>
</body>
</html>
